runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 20

env:
  - variable: NEXT_PUBLIC_FIREBASE_WEBAPP_CONFIG
    secret: FIREBASE_WEBAPP_CONFIG
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SESSION_WS_URL
    secret: SESSION_WS_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_REQUIRE_FIREBASE_AUTH
    secret: REQUIRE_FIREBASE_AUTH
    availability:
      - BUILD
      - RUNTIME
